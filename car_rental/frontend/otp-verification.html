<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - Elite Rentals</title>
    <meta name="description" content="Verify your booking with the OTP sent to your email">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .otp-card {
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 900;
            color: #FFD700;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .otp-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #ffffff;
        }

        .otp-subtitle {
            color: #cccccc;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .email-display {
            background: #333;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-weight: 600;
            color: #FFD700;
            border: 1px solid #444;
        }

        .otp-input-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .otp-input {
            width: 60px;
            height: 60px;
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 12px;
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            transition: all 0.3s ease;
            outline: none;
        }

        .otp-input:focus {
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        .otp-input.filled {
            border-color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
        }

        .timer-display {
            font-size: 1.1rem;
            color: #FFD700;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .timer-display.expired {
            color: #ff4444;
        }

        .verify-btn {
            width: 100%;
            background: linear-gradient(135deg, #FFD700 0%, #FFA000 100%);
            color: #000000;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .verify-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #FFA000 0%, #FF8F00 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
        }

        .verify-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .resend-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .resend-btn {
            background: none;
            border: none;
            color: #FFD700;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.3s ease;
        }

        .resend-btn:hover:not(:disabled) {
            color: #FFA000;
        }

        .resend-btn:disabled {
            color: #888;
            cursor: not-allowed;
            text-decoration: none;
        }

        .back-link {
            color: #cccccc;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #FFD700;
        }

        .status-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status-message.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
            color: #4CAF50;
        }

        .status-message.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
        }

        .status-message.info {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid #2196F3;
            color: #2196F3;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-radius: 50%;
            border-top-color: #FFD700;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .otp-card {
                padding: 2rem;
            }

            .otp-input-group {
                gap: 0.5rem;
            }

            .otp-input {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .otp-input {
                width: 45px;
                height: 45px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="otp-card">
            <div class="brand-logo">ELITE RENTALS</div>
            <h1 class="otp-title">Verify Your Booking</h1>
            <p class="otp-subtitle">We've sent a verification code to your email address</p>
            
            <div class="email-display" id="userEmail">
                Loading email address...
            </div>

            <div class="status-message" id="statusMessage"></div>

            <form id="otpForm">
                <div class="otp-input-group">
                    <input type="text" class="otp-input" maxlength="1" id="otp1" autocomplete="off">
                    <input type="text" class="otp-input" maxlength="1" id="otp2" autocomplete="off">
                    <input type="text" class="otp-input" maxlength="1" id="otp3" autocomplete="off">
                    <input type="text" class="otp-input" maxlength="1" id="otp4" autocomplete="off">
                    <input type="text" class="otp-input" maxlength="1" id="otp5" autocomplete="off">
                    <input type="text" class="otp-input" maxlength="1" id="otp6" autocomplete="off">
                </div>

                <div class="timer-display" id="timerDisplay">
                    Code expires in: <span id="countdown">05:00</span>
                </div>

                <button type="submit" class="verify-btn" id="verifyBtn">
                    Verify OTP
                </button>
            </form>

            <div class="resend-section">
                <span>Didn't receive the code?</span>
                <button type="button" class="resend-btn" id="resendBtn">Resend OTP</button>
            </div>

            <a href="booking.html" class="back-link">← Back to Booking</a>
        </div>
    </div>

    <script>
        // Get booking data from URL parameters or localStorage
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('bookingId') || localStorage.getItem('currentBookingId');
        const userEmail = urlParams.get('email') || localStorage.getItem('userEmail');
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            initializeOTPPage();
            setupOTPInputs();
            setupTimers();
        });

        function initializeOTPPage() {
            // Display user email
            if (userEmail) {
                document.getElementById('userEmail').textContent = userEmail;
            } else {
                document.getElementById('userEmail').textContent = 'your registered email address';
            }

            // Check if we have booking data
            if (!bookingId) {
                showStatus('No booking found. Please complete your booking first.', 'error');
                document.getElementById('verifyBtn').disabled = true;
                setTimeout(() => {
                    window.location.href = 'booking.html';
                }, 3000);
                return;
            }

            console.log('OTP verification initialized for booking:', bookingId);
        }

        function setupOTPInputs() {
            const inputs = document.querySelectorAll('.otp-input');
            
            inputs.forEach((input, index) => {
                // Handle input events
                input.addEventListener('input', function(e) {
                    const value = e.target.value.replace(/[^0-9]/g, ''); // Only allow numbers
                    e.target.value = value;
                    
                    if (value && index < inputs.length - 1) {
                        inputs[index + 1].focus(); // Move to next input
                    }
                    
                    // Add filled class
                    if (value) {
                        e.target.classList.add('filled');
                    } else {
                        e.target.classList.remove('filled');
                    }

                    // Check if all inputs are filled
                    checkAllInputsFilled();
                });

                // Handle backspace
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        inputs[index - 1].focus();
                        inputs[index - 1].value = '';
                        inputs[index - 1].classList.remove('filled');
                    }
                });

                // Handle paste
                input.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const paste = (e.clipboardData || window.clipboardData).getData('text');
                    const digits = paste.replace(/[^0-9]/g, '').slice(0, 6);
                    
                    digits.split('').forEach((digit, i) => {
                        if (inputs[i]) {
                            inputs[i].value = digit;
                            inputs[i].classList.add('filled');
                        }
                    });
                    
                    // Focus on the next empty input or the last one
                    const nextEmpty = digits.length < inputs.length ? digits.length : inputs.length - 1;
                    inputs[nextEmpty].focus();
                    
                    checkAllInputsFilled();
                });
            });
        }

        function checkAllInputsFilled() {
            const inputs = document.querySelectorAll('.otp-input');
            const allFilled = Array.from(inputs).every(input => input.value.length === 1);
            
            if (allFilled) {
                // Auto-submit if all fields are filled
                setTimeout(() => {
                    document.getElementById('otpForm').dispatchEvent(new Event('submit'));
                }, 500);
            }
        }

        function setupTimers() {
            let timeLeft = 5 * 60; // 5 minutes in seconds
            const countdownElement = document.getElementById('countdown');
            const timerDisplay = document.getElementById('timerDisplay');
            
            const timer = setInterval(() => {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                
                countdownElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    timerDisplay.classList.add('expired');
                    countdownElement.textContent = 'EXPIRED';
                    document.getElementById('verifyBtn').disabled = true;
                    showStatus('OTP has expired. Please request a new code.', 'error');
                    document.getElementById('resendBtn').disabled = false;
                }
                
                timeLeft--;
            }, 1000);
        }

        // Form submission
        document.getElementById('otpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const inputs = document.querySelectorAll('.otp-input');
            const otp = Array.from(inputs).map(input => input.value).join('');
            
            if (otp.length !== 6) {
                showStatus('Please enter the complete 6-digit OTP.', 'error');
                return;
            }

            if (!bookingId) {
                showStatus('Booking ID not found. Please try booking again.', 'error');
                return;
            }

            const verifyBtn = document.getElementById('verifyBtn');
            const originalText = verifyBtn.textContent;
            
            // Show loading state
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<span class="loading-spinner"></span> Verifying...';
            
            try {
                const response = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        bookingId: bookingId,
                        otp: otp
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    showStatus('✅ OTP verified successfully! Redirecting to confirmation...', 'success');
                    
                    // Get the pending booking data and mark it as confirmed
                    const pendingBookingData = localStorage.getItem('pendingBookingData');
                    let bookingData = {};
                    
                    if (pendingBookingData) {
                        bookingData = JSON.parse(pendingBookingData);
                    }
                    
                    // Add confirmation details
                    bookingData.bookingId = bookingId;
                    bookingData.status = 'confirmed';
                    bookingData.verifiedAt = new Date().toISOString();
                    bookingData.otpVerified = true;
                    
                    // Store confirmed booking data
                    localStorage.setItem('bookingData', JSON.stringify(bookingData));
                    
                    // Clean up temporary data
                    localStorage.removeItem('pendingBookingData');
                    localStorage.removeItem('currentBookingId');
                    
                    console.log('OTP verified, booking confirmed:', bookingData);
                    
                    // Redirect to confirmation page after a short delay
                    setTimeout(() => {
                        window.location.href = 'confirmation.html';
                    }, 2000);
                    
                } else {
                    showStatus(data.message || 'Invalid OTP. Please try again.', 'error');
                    
                    // Clear the inputs for retry
                    inputs.forEach(input => {
                        input.value = '';
                        input.classList.remove('filled');
                    });
                    inputs[0].focus();
                }
                
            } catch (error) {
                console.error('OTP verification error:', error);
                showStatus('Network error. Please check your connection and try again.', 'error');
            } finally {
                // Reset button state
                verifyBtn.disabled = false;
                verifyBtn.textContent = originalText;
            }
        });

        // Resend OTP
        document.getElementById('resendBtn').addEventListener('click', async function() {
            if (!bookingId) {
                showStatus('No booking found to resend OTP.', 'error');
                return;
            }

            const resendBtn = document.getElementById('resendBtn');
            const originalText = resendBtn.textContent;
            
            resendBtn.disabled = true;
            resendBtn.textContent = 'Sending...';
            
            try {
                const response = await fetch('/api/resend-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        bookingId: bookingId
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    showStatus('New OTP sent to your email address.', 'success');
                    
                    // Reset timer
                    location.reload();
                    
                } else {
                    showStatus(data.message || 'Failed to resend OTP. Please try again.', 'error');
                }
                
            } catch (error) {
                console.error('Resend OTP error:', error);
                showStatus('Network error. Please try again.', 'error');
            } finally {
                setTimeout(() => {
                    resendBtn.disabled = false;
                    resendBtn.textContent = originalText;
                }, 3000);
            }
        });

        function showStatus(message, type) {
            const statusElement = document.getElementById('statusMessage');
            statusElement.textContent = message;
            statusElement.className = `status-message ${type}`;
            statusElement.style.display = 'block';
            
            // Auto-hide success messages after 3 seconds
            if (type === 'success') {
                setTimeout(() => {
                    statusElement.style.display = 'none';
                }, 3000);
            }
        }

        // Auto-focus first input on page load
        window.addEventListener('load', () => {
            document.getElementById('otp1').focus();
        });
    </script>
</body>
</html>
