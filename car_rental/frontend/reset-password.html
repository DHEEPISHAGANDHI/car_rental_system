<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Elite Rentals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .reset-container {
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-text {
            font-size: 2rem;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .brand-sub {
            font-size: 1rem;
            color: #ccc;
            margin-top: 0.5rem;
            display: block;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .reset-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .reset-subtitle {
            color: #ccc;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #ffffff;
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem;
            background: #2a2a2a;
            border: 1px solid #555;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        .password-requirements {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 0.5rem;
        }

        .requirements-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #FFD700;
            margin-bottom: 0.5rem;
        }

        .requirement-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
            color: #ccc;
        }

        .requirement-item.valid {
            color: #4CAF50;
        }

        .requirement-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .requirement-icon.valid {
            border-color: #4CAF50;
            background: #4CAF50;
            color: #000;
        }

        .reset-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #FFD700 0%, #FFA000 100%);
            color: #000000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .reset-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #FFA000 0%, #FF8F00 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
        }

        .reset-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message-box {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .message-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid #4CAF50;
            color: #4CAF50;
        }

        .message-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #f44336;
        }

        .message-info {
            background: rgba(33, 150, 243, 0.1);
            border: 1px solid #2196F3;
            color: #2196F3;
        }

        .back-link {
            text-align: center;
            margin-top: 2rem;
        }

        .back-link a {
            color: #FFD700;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-link a:hover {
            color: #FFA000;
            text-decoration: underline;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top: 2px solid #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .reset-container {
                padding: 2rem;
                margin: 1rem;
            }

            .reset-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="brand">
            <div class="brand-text">ELITE</div>
            <span class="brand-sub">RENTALS</span>
        </div>

        <div class="reset-header">
            <h1 class="reset-title">Reset Your Password</h1>
            <p class="reset-subtitle">Enter your new password below</p>
        </div>

        <!-- Message Box -->
        <div class="message-box" id="messageBox"></div>

        <!-- Reset Password Form -->
        <form id="resetPasswordForm">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" id="newPassword" 
                       placeholder="Enter your new password" required>
                
                <!-- Password Requirements -->
                <div class="password-requirements">
                    <div class="requirements-title">Password Requirements:</div>
                    <div class="requirement-item" id="req-length">
                        <span class="requirement-icon">✓</span>
                        <span>At least 8 characters long</span>
                    </div>
                    <div class="requirement-item" id="req-uppercase">
                        <span class="requirement-icon">✓</span>
                        <span>Contains uppercase letter (A-Z)</span>
                    </div>
                    <div class="requirement-item" id="req-lowercase">
                        <span class="requirement-icon">✓</span>
                        <span>Contains lowercase letter (a-z)</span>
                    </div>
                    <div class="requirement-item" id="req-number">
                        <span class="requirement-icon">✓</span>
                        <span>Contains at least one number</span>
                    </div>
                    <div class="requirement-item" id="req-special">
                        <span class="requirement-icon">✓</span>
                        <span>Contains special character (!@#$%^&*)</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" class="form-input" id="confirmPassword" 
                       placeholder="Confirm your new password" required>
                <div id="passwordMatchError" style="color: #f44336; font-size: 0.85rem; margin-top: 0.5rem; display: none;">
                    Passwords do not match
                </div>
            </div>

            <button type="submit" class="reset-btn" id="resetBtn">
                <span class="btn-content">
                    <span id="btnText">Reset Password</span>
                </span>
            </button>
        </form>

        <div class="back-link">
            <a href="index.html">← Back to Login</a>
        </div>
    </div>

    <script>
        // Get token from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');
        const email = urlParams.get('email');

        // Check if token exists
        if (!resetToken || !email) {
            showMessage('Invalid or expired reset link. Please request a new password reset.', 'error');
            document.getElementById('resetPasswordForm').style.display = 'none';
        }

        // Password validation
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        newPasswordInput.addEventListener('input', validatePassword);
        confirmPasswordInput.addEventListener('input', validatePasswordMatch);

        function validatePassword() {
            const password = newPasswordInput.value;
            
            // Length check
            const lengthValid = password.length >= 8;
            updateRequirement('req-length', lengthValid);
            
            // Uppercase check
            const uppercaseValid = /[A-Z]/.test(password);
            updateRequirement('req-uppercase', uppercaseValid);
            
            // Lowercase check
            const lowercaseValid = /[a-z]/.test(password);
            updateRequirement('req-lowercase', lowercaseValid);
            
            // Number check
            const numberValid = /\d/.test(password);
            updateRequirement('req-number', numberValid);
            
            // Special character check
            const specialValid = /[!@#$%^&*(),.?":{}|<>]/.test(password);
            updateRequirement('req-special', specialValid);
            
            return lengthValid && uppercaseValid && lowercaseValid && numberValid && specialValid;
        }

        function updateRequirement(id, isValid) {
            const element = document.getElementById(id);
            if (isValid) {
                element.classList.add('valid');
                element.querySelector('.requirement-icon').classList.add('valid');
            } else {
                element.classList.remove('valid');
                element.querySelector('.requirement-icon').classList.remove('valid');
            }
        }

        function validatePasswordMatch() {
            const password = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const errorDiv = document.getElementById('passwordMatchError');
            
            if (confirmPassword && password !== confirmPassword) {
                errorDiv.style.display = 'block';
                return false;
            } else {
                errorDiv.style.display = 'none';
                return true;
            }
        }

        // Form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            // Validate password
            if (!validatePassword()) {
                showMessage('Please ensure your password meets all requirements.', 'error');
                return;
            }
            
            // Check password match
            if (password !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                return;
            }
            
            // Show loading state
            const resetBtn = document.getElementById('resetBtn');
            const btnText = document.getElementById('btnText');
            resetBtn.disabled = true;
            btnText.innerHTML = '<div class="loading-spinner"></div>Resetting Password...';
            
            try {
                const response = await fetch('http://localhost:5000/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: resetToken,
                        email: email,
                        newPassword: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Password reset successful! You can now login with your new password.', 'success');
                    document.getElementById('resetPasswordForm').style.display = 'none';
                    
                    // Redirect to login page after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                } else {
                    showMessage(data.message || 'Failed to reset password. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Reset password error:', error);
                showMessage('Network error. Please check your connection and try again.', 'error');
            } finally {
                // Reset button state
                resetBtn.disabled = false;
                btnText.innerHTML = 'Reset Password';
            }
        });

        function showMessage(message, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = message;
            messageBox.className = `message-box message-${type}`;
            messageBox.style.display = 'block';
            
            // Auto-hide error messages after 5 seconds
            if (type === 'error') {
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
